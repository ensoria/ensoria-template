services:
  ensoria-ensoria-template-localstack:
    container_name: "ensoria-ensoria-template-localstack"
    image: localstack/localstack
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # external services port range
    environment:
      # LocalStack configuration: https://docs.localstack.cloud/references/configuration/
      - DEBUG=${DEBUG:-0}
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - DB_NAME=${DB_NAME:-ensoria}
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
    volumes:
      - "./.localstack/volume:/var/lib/localstack"
      # https://docs.localstack.cloud/references/init-hooks/#lifecycle-stages-and-hooks
      - "./.localstack/init:/etc/localstack/init"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - ensoria-ensoria-template-network

  ensoria-ensoria-template-rabbitmq:
    image: rabbitmq:4-management
    container_name: ensoria-mb-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=myuser
      - RABBITMQ_DEFAULT_PASS=mypassword
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ensoria-ensoria-template-network

  ensoria-ensoria-template-redis:
    image: redis:7.4-alpine
    container_name: ensoria-ensoria-template-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - ensoria-ensoria-template-network


  ensoria-ensoria-template-postgres:
    image: postgres:16-alpine
    container_name: ensoria-ensoria-template-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ensoria
      POSTGRES_USER: ensoria
      POSTGRES_PASSWORD: ensoria
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worker"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - ensoria-ensoria-template-network

  # ローカルのモックレジストリ（encli build image --push の動作確認用）。
  # 認証不要。localhost 宛は Docker が HTTP push を許可するため insecure 設定も不要。
  # macOS では 5000 番が AirPlay と衝突するため 5001 を使う。
  ensoria-ensoria-template-registry:
    image: registry:2
    container_name: ensoria-ensoria-template-registry
    ports:
      - "127.0.0.1:5001:5000"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - ensoria-ensoria-template-network

  # S3 互換オブジェクトストレージ（files3 ディスク用）。
  ensoria-ensoria-template-minio:
    image: minio/minio:latest
    container_name: ensoria-ensoria-template-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web コンソール（http://localhost:9001）
    volumes:
      - minio-data:/data
    # minio 公式イメージはシェル/curl を含まないためコンテナ内 healthcheck は付けない。
    # 準備完了は createbuckets のリトライループで担保する。
    restart: unless-stopped
    networks:
      - ensoria-ensoria-template-network

  # files3 ディスクが使うバケットを MinIO 起動後に作成する one-shot。
  ensoria-ensoria-template-createbuckets:
    image: minio/mc:latest
    container_name: ensoria-ensoria-template-createbuckets
    depends_on:
      - ensoria-ensoria-template-minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://ensoria-ensoria-template-minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb --ignore-existing local/ensoria;
      echo 'bucket ready';
      "
    restart: "no"
    networks:
      - ensoria-ensoria-template-network

  encli-ensoria-template-mysql:
    image: mysql:latest
    container_name: ensoria-ensoria-template-mysql
    restart: always
    environment:
      MYSQL_USER: ensoria
      MYSQL_PASSWORD: ensoria
      MYSQL_ROOT_PASSWORD: ensoria
      MYSQL_DATABASE: ensoria
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ensoria-ensoria-template-network


networks:
  ensoria-ensoria-template-network:
    driver: bridge

volumes:
  rabbitmq-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  mysql-data:
    driver: local
  registry-data:
    driver: local
  minio-data:
    driver: local

